<!DOCTYPE html>
<html lang="ja" data-lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Davi</title>
  <link rel="stylesheet" href="../../CSS/portfolioStyles.css" />
  <script defer src="../../JS/portfolio.js"></script>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="glow glow--a"></div>
    <div class="glow glow--b"></div>
    <div class="grid"></div>
    <div class="noise"></div>
  </div>

  <header class="header" data-header>
    <div class="container header__content">
      <a class="brand" href="../../../index.html" aria-label="Davi Portfolio">
        <span class="brand__mark">DP</span>
        <span class="brand__text">Davi</span>
      </a>

      <button class="menu-toggle" type="button" aria-label="メニューを開く" aria-expanded="false" data-menu-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav" aria-label="メインナビゲーション" data-nav>
        <a href="#sobre" class="nav__link" data-i18n="nav.about"></a>
        <a href="#skills" class="nav__link" data-i18n="nav.skills"></a>
        <a href="#projetos" class="nav__link" data-i18n="nav.projects"></a>
        <a href="#experiencia" class="nav__link" data-i18n="nav.experience"></a>
        <a href="#conteudos" class="nav__link" data-i18n="nav.content"></a>
        <a href="#contato" class="nav__link" data-i18n="nav.contact"></a>
      </nav>

      <div class="language-switch" aria-label="Idiomas">
        <a href="../portugues/portfolio.html" data-lang-link="pt">PT</a>
        <a href="../English/portfolio.html" data-lang-link="en">EN</a>
        <a href="../japanese/portfolio.html" data-lang-link="ja">JA</a>
      </div>

      <button class="theme-toggle" type="button" aria-label="ライトテーマとダークテーマを切り替える" data-theme-toggle>
        <span data-theme-icon>☾</span>
      </button>
    </div>
  </header>

  <main class="main">
    <section class="section hero" id="inicio">
      <div class="container hero__grid">
        <div class="hero__left reveal">
          <div class="kicker" data-i18n="hero.kicker"></div>
          <h1 class="h1" data-i18n="hero.title"></h1>
          <p class="lead" data-i18n="hero.lead"></p>

          <div class="chips" aria-label="Tecnologias" data-skills-inline></div>

          <div class="hero__actions">
            <a class="btn btn--primary" href="#projetos">
              <span data-i18n="hero.projectsButton"></span>
              <span class="btn__icon" aria-hidden="true">-&gt;</span>
            </a>
            <a class="btn btn--ghost" href="https://github.com/DaviTaiyo" target="_blank" rel="noreferrer">GitHub</a>
            <a class="btn btn--ghost" href="https://www.linkedin.com/in/davipaulino/" target="_blank" rel="noreferrer">LinkedIn</a>
          </div>
        </div>

        <aside class="hero__right reveal">
          <div class="profile-card">
            <div class="avatar" aria-hidden="true">DP</div>
            <div class="profile__info">
              <h2 class="profile__name">Davi Emanuel Paulino</h2>
              <p class="profile__role" data-i18n="profile.role"></p>
            </div>

            <div class="profile__meta" data-profile-meta></div>

            <div class="divider"></div>

            <div class="profile__cta">
              <a class="mini" href="#contato" data-i18n="profile.available"></a>
              <span class="dot">•</span>
              <a class="mini" href="#projetos" data-i18n="profile.cases"></a>
            </div>
          </div>
        </aside>
      </div>
    </section>

    <section id="sobre" class="section">
      <div class="container">
        <div class="section__head reveal">
          <h2 class="h2" data-i18n="about.title"></h2>
          <p class="section__sub" data-i18n="about.subtitle"></p>
        </div>
        <div class="grid2" data-about-cards></div>
      </div>
    </section>

    <section id="skills" class="section">
      <div class="container">
        <div class="section__head reveal">
          <h2 class="h2" data-i18n="skills.title"></h2>
          <p class="section__sub" data-i18n="skills.subtitle"></p>
        </div>
        <div class="grid3" data-skill-groups></div>
      </div>
    </section>

    <section id="projetos" class="section">
      <div class="container">
        <div class="section__head reveal">
          <h2 class="h2" data-i18n="projects.title"></h2>
          <p class="section__sub" data-i18n="projects.subtitle"></p>
        </div>
        <div class="projects-toolbar reveal">
          <div class="repo-status" data-repo-status></div>
          <a class="mini" href="https://github.com/DaviTaiyo?tab=repositories" target="_blank" rel="noreferrer" data-i18n="projects.allRepos"></a>
        </div>
        <div class="projects" data-projects></div>
      </div>
    </section>

    <section id="experiencia" class="section">
      <div class="container">
        <div class="section__head reveal">
          <h2 class="h2" data-i18n="experience.title"></h2>
          <p class="section__sub" data-i18n="experience.subtitle"></p>
        </div>
        <div class="timeline" data-timeline></div>
      </div>
    </section>

    <section id="conteudos" class="section">
      <div class="container">
        <div class="section__head reveal">
          <h2 class="h2" data-i18n="content.title"></h2>
          <p class="section__sub" data-i18n="content.subtitle"></p>
        </div>
        <div class="grid3" data-content-cards></div>
      </div>
    </section>

    <section id="contato" class="section">
      <div class="container">
        <div class="section__head reveal">
          <h2 class="h2" data-i18n="contact.title"></h2>
          <p class="section__sub" data-i18n="contact.subtitle"></p>
        </div>

        <div class="grid2">
          <form class="card form reveal" data-contact-form>
            <label class="field">
              <span class="field__label" data-i18n="contact.name"></span>
              <input class="input" type="text" name="name" autocomplete="name" />
            </label>
            <label class="field">
              <span class="field__label" data-i18n="contact.subject"></span>
              <input class="input" type="text" name="subject" autocomplete="off" />
            </label>
            <label class="field">
              <span class="field__label" data-i18n="contact.message"></span>
              <textarea class="input input--area" name="message" rows="5"></textarea>
            </label>
            <button class="btn btn--primary" type="submit">
              <span data-i18n="contact.send"></span>
              <span class="btn__icon" aria-hidden="true">-&gt;</span>
            </button>
            <p class="p small form__hint" data-form-hint></p>
          </form>

          <aside class="card contact reveal">
            <h3 class="h3" data-i18n="contact.direct"></h3>
            <p class="p small" data-i18n="contact.directText"></p>
            <div class="contact__list">
              <a class="contact__item" href="mailto:daviepaulino@hotmail.com">
                <span class="contact__k">Email</span>
                <span class="contact__v">daviepaulino@hotmail.com</span>
              </a>
              <a class="contact__item" href="https://www.linkedin.com/in/davipaulino/" target="_blank" rel="noreferrer">
                <span class="contact__k">LinkedIn</span>
                <span class="contact__v">/in/davipaulino</span>
              </a>
              <a class="contact__item" href="https://github.com/DaviTaiyo" target="_blank" rel="noreferrer">
                <span class="contact__k">GitHub</span>
                <span class="contact__v">@DaviTaiyo</span>
              </a>
            </div>
          </aside>
        </div>

        <footer class="footer">
          <p class="footer__text">© <span data-year></span> Davi Emanuel Paulino</p>
        </footer>
      </div>
    </section>
  </main>
</body>
</html>
